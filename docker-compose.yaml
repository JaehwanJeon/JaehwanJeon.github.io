services:
  jekyll-site:
    image: jekyll-site
    build: .
    volumes:
      - .:/usr/src/app
      - ${HOME}/.claude:/home/vscode/.claude   # share host Claude Code auth/config
    ports: [ 4000:4000 ]
    user: 1000:1000
    environment: [ JEKYLL_ENV=docker ]
    command: bundle exec jekyll serve -H 0.0.0.0 --no-watch --config _config.yml,_config_docker.yml
