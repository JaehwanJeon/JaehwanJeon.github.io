- title: Physics-based Encoder-only Transformer for Unified Modeling and Prediction
    of Structural Hysteresis
  category: underreview
  date: 2026-02-07
  venue: Submitted to Earthquake Engineering & Structural Dynamics
  excerpt: This study proposes a Physics-based Encoder-only Transformer (PET) model
    for unified hysteresis modeling. It incorporates relative positional encoding
    and physics-informed learning biases based on Drucker’s postulate to ensure physically
    consistent predictions across diverse structural behaviors.
  citation: Joo, J., Jeon, J., & Song, J. (2026). &quot;Physics-based Encoder-only
    Transformer for Unified Modeling and Prediction of Structural Hysteresis.&quot;
    <i>Earthquake Engineering & Structural Dynamics (Submitted)</i>.
- title: Ensemble-based Uncertainty Quantification and Decomposition of Probabilistic
    Surrogate Models Using Bayesian Neural Networks
  category: manuscripts
  date: 2026-01-23
  venue: Structural Safety
  paperurl: https://doi.org/10.1016/j.strusafe.2026.102698
  excerpt: This study presents a new framework for decomposing predictive uncertainty
    in ensembles of Bayesian neural networks, systematically separating irreducible
    randomness from reducible model-form and data-induced uncertainties.
  citation: Jeon, J., Song, J., & Kwon, O. (2026). &quot;Ensemble-based Uncertainty
    Quantification and Decomposition of Probabilistic Surrogate Models Using Bayesian
    Neural Networks.&quot; <i>Structural Safety</i>. https://doi.org/10.1016/j.strusafe.2026.102698
